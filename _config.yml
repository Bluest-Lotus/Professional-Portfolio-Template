title: "John’s Portfolio"
email: your-email@example.com
description: "Engineering projects, design systems, and technical work."
baseurl: ""
url: "https://yourusername.github.io"

collections:
  projects:
    output: true
    permalink: /projects/:name/

theme: null

plugins:
  - jekyll-feed
  - jekyll-seo-tag

markdown: kramdown
permalink: pretty

defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: project

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md